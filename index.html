const _L=document.getElementById('_L'),_X=document.getElementById('_X'),_P=document.getElementById('_P'),_T=document.getElementById('_T'),_B=document.getElementById('_B'),_CAN=document.getElementById('_C'),_BG=document.getElementById('_BG'),_CTA=document.getElementById('_CTA'),_SUB=document.getElementById('_SUB'),_LUI=document.getElementById('_LANG_UI'),_LSEL=document.getElementById('_L_SEL');

let _s=0,_M={x:-1000,y:-1000};

if(!_D[_LN]) _LN = 'en';

window._setL = function(l){

if(window.location.hash) {

function _iP(){
    const c=_CAN.getContext('2d');_CAN.width=window.innerWidth;_CAN.height=window.innerHeight;_CAN.style.opacity='0.4';
    let p=[];const n=35;
    for(let i=0;i<n;i++)p.push({x:Math.random()*_CAN.width,y:Math.random()*_CAN.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:1.2});
    function d(){
        c.clearRect(0,0,_CAN.width,_CAN.height);c.fillStyle="rgba(6, 182, 212, 0.15)";c.strokeStyle="rgba(6, 182, 212, 0.08)";
        for(let i=0;i<n;i++){
            let p1=p[i];p1.x+=p1.vx;p1.y+=p1.vy;
            if(p1.x<0||p1.x>_CAN.width)p1.vx*=-1;if(p1.y<0||p1.y>_CAN.height)p1.vy*=-1;
            c.beginPath();c.arc(p1.x,p1.y,p1.r,0,Math.PI*2);c.fill();
            for(let j=i+1;j<n;j++){
                let p2=p[j],dJ=Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2);
                if(dJ<200){c.beginPath();c.moveTo(p1.x,p1.y);c.lineTo(p2.x,p2.y);c.lineWidth=.4;c.stroke()}
            }
        }requestAnimationFrame(d);
    }d();
}

          },_totalD-1000);

            }, _rD);
        }

    }

}
