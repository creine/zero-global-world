<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AETHER_PROT_v2.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
body{margin:0;padding:0;background:#000;color:#0ff41;font-family:'Courier New',Courier,monospace;overflow:hidden;cursor:crosshair}
#_SYS_UI{position:absolute;top:20px;left:20px;pointer-events:none;z-index:10;width:90%}
._L{font-size:1.2rem;text-shadow:0 0 5px #00ff41;margin-bottom:5px;opacity:0;transition:opacity .5s}
._V{opacity:1}
#_EXEC{display:none;position:absolute;bottom:50px;left:50%;transform:translateX(-50%);padding:18px 36px;background:0 0;border:2px solid #00ff41;color:#00ff41;font-family:inherit;font-size:1.6rem;cursor:pointer;z-index:20;transition:all .3s;text-transform:uppercase;font-weight:700}
#_EXEC:hover{background:#00ff41;color:#000;box-shadow:0 0 25px #00ff41}
canvas{position:absolute;top:0;left:0;z-index:1}
</style>
</head>
<body>
<div id="_SYS_UI">
<div class="_L" id="_L1"></div>
<div class="_L" id="_L2"></div>
<div class="_L" id="_L3"></div>
</div>
<button id="_EXEC"></button>
<script>
(function(){
const _K = "eyJlbiI6eyJzIjoiQUVUSEVSX0xPQURJTkciLCJpIjoic3lzdGVtX2xvYWQuc3lzIiwidCI6Im5ldXRyYWxpemVfZnJpY3Rpb24uZXhlIiwiYSI6IkpPSU5fSE9SSVpPTiIsImYiOlsiREVIVCIsIlJFTlQiLCJCSUxMUyIsIkJPU1MiLCJGRUFSIiwiQU5HRVIiLCJIVU5HRVIiXSwiciI6WyJQRUFDRSIsIkZBTUlMWSIsIlJFU1QiLCJTUE9SVFMiLCJBUlQiLCJGT09EIiwiRlJFRURPTSJdfSwicHQiOnsycyI6IkFFVEhFUl9DT05FQ1RBTkRPIiwiaSI6ImNhcnJlZ2FuZG9fc2lzdGVtYS5zeXMiLCJ0IjoidG9xdWVfbmFfZG9yLmV4ZSIsImEiOiJFTlRSQVJfTk9fSE9SSVpPTlRFIiwiZiI6WyJESVZJREFTIiwiQUxVR1VFTCIsIkNPTlRBUyIsIlBBVFJBTyIsIk1FRE8iLCJSQUlWQSIsIkZPTUUiXSwiciI6WyJQQVoiLCJGQU1JTElBIiwiREVTQ0FOU08iLCJFU1BPUlRFIiwiQVJURSIsIkNPTUlQSIsIkxJQkVSREFERSJdfX0=";
const _G = (s) => JSON.parse(decodeURIComponent(escape(atob(s))));
const _D = _G(_K);
const _LN = navigator.language.split('-')[0]||'en';
const _C = _D[_LN]||_D.en;
document.getElementById('_L1').innerText=`> [ ${_C.s} ]`;
document.getElementById('_L2').innerText=`> [ ${_C.i} ]`;
document.getElementById('_L3').innerText=`> [ ${_C.t} ]`;
document.getElementById('_EXEC').innerText=_C.a;
const {Engine:_E,Render:_R,Runner:_RN,Bodies:_B,Composite:_CP,Events:_EV}=Matter;
const _eng=_E.create(),_wld=_eng.world;
const _rnd=_R.create({element:document.body,engine:_eng,options:{width:window.innerWidth,height:window.innerHeight,wireframes:false,background:'transparent'}});
const _grd=_B.rectangle(window.innerWidth/2,window.innerHeight+25,window.innerWidth,50,{isStatic:true,render:{visible:false}});
_CP.add(_wld,_grd);
let _bds=[],_up=[];
function _spw(t,x,y,d,c,s){
const cv=document.createElement('canvas');cv.width=t.length*s*1.2;cv.height=s*2.5;
const ct=cv.getContext('2d');ct.font=`bold ${s}px 'Courier New'`;ct.fillStyle=c;ct.textAlign='center';
if(d){ct.shadowColor=c;ct.shadowBlur=15}
ct.fillText(t,cv.width/2,s*1.5);
const b=_B.rectangle(x,y,cv.width,cv.height,{render:{sprite:{texture:cv.toDataURL()}},restitution:.6,friction:.1,frictionAir:d?.01:.03,isStatic:false});
b._isD=d;return b;
}
const _sh=(id,ms)=>setTimeout(()=>document.getElementById(id).classList.add('_V'),ms);
_sh('_L1',500);_sh('_L2',1200);_sh('_L3',2000);
setTimeout(()=>{
_C.f.forEach((w,i)=>{
setTimeout(()=>{
const b=_spw(w,Math.random()*(window.innerWidth-100)+50,-50,true,'#ff4141',28);
_bds.push(b);_CP.add(_wld,b);
},i*600);
});
},3000);
_rnd.canvas.addEventListener('mousedown',e=>{
const m={x:e.clientX,y:e.clientY};
const t=_bds.find(b=>Matter.Bounds.contains(b.bounds,m));
if(t){
_CP.remove(_wld,t);_bds=_bds.filter(b=>b!==t);
for(let i=0;i<15;i++){
const p=_B.circle(t.position.x,t.position.y,2,{render:{fillStyle:'#00ff41'},frictionAir:.05,collisionFilter:{group:-1}});
_CP.add(_wld,p);setTimeout(()=>_CP.remove(_wld,p),1000);
}
if(_bds.length===0)_vct();
}
});
let _v=false;
function _vct(){
if(_v)return;_v=true;
document.getElementById('_L2').innerText=`> [ SYS_STATUS: VOID_CLEARED ]`;
document.getElementById('_L3').innerText=`> [ INITIALIZING_HORIZON_STATE ]`;
_C.r.forEach((w,i)=>{
setTimeout(()=>{
const b=_spw(w,Math.random()*(window.innerWidth-150)+75,window.innerHeight+100,false,'#00ff41',30);
_CP.add(_wld,b);_up.push(b);
},i*800);
});
_EV.on(_eng,'afterUpdate',()=>{
_up.forEach(b=>{
Matter.Body.applyForce(b,b.position,{x:0,y:-.006});
if(b.position.y<-150)b.position.y=window.innerHeight+150;
});
});
setTimeout(()=>document.getElementById('_EXEC').style.display='block',6000);
}
_R.run(_rnd);_RN.run(_RN.create(),_eng);
document.getElementById('_EXEC').onclick=()=>window.location.href='manifesto.html';
})();
</script>
</body>
</html>
