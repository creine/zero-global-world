<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROGLOBAL.WORLD | AETHER PROTOCOL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #00ff41; font-family: 'Courier New', Courier, monospace; overflow: hidden; cursor: default; }
        #ui-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; width: 80%; }
        .matrix-text { font-size: 1.1rem; text-shadow: 0 0 5px #00ff41; margin-bottom: 4px; white-space: pre-wrap; visibility: hidden; }
        .visible { visibility: visible; }
        .highlight { color: #fff; text-shadow: 0 0 10px #00ff41; font-weight: bold; }
        #confirm-btn { display: none; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: transparent; border: 1px solid #00ff41; color: #00ff41; font-family: inherit; font-size: 1.4rem; cursor: pointer; z-index: 20; transition: all 0.3s; text-transform: uppercase; }
        #confirm-btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="matrix-text" id="l1">> [ AETHER_NEXUS_v1.5 ]</div>
    <div class="matrix-text" id="l2">> [ STATUS: PROTOCOLO DE GÊNESE ATIVADO ]</div>
    <div class="matrix-text" id="l3">> [ ALVO: DESATIVAÇÃO DO SISTEMA ANTIGO ]</div>
    <div class="matrix-text" id="l4">> [ INSTRUÇÃO: <span class="highlight">CLIQUE NAS PALAVRAS QUE TE CAUSAM DOR</span> ]</div>
</div>

<button id="confirm-btn">Confirmar Novo Modelo</button>

<script>
    // 🌍 Traduções e Palavras de Impacto (Ciclo I - Dor, Ciclo II - Futuro)
    const content = {
        en: { 
            status: "GENESIS_INITIALIZED",
            fall: ["DEBT", "WAR", "FEAR", "SCARCITY", "CONTROL", "INTEREST", "ANXIETY"], 
            rise: ["TIME", "CREATION", "SECURITY", "ABUNDANCE", "SYMBIOSIS", "HARMONY"] 
        },
        pt: { 
            status: "GÊNESE_INICIALIZADA",
            fall: ["DÍVIDA", "GUERRA", "MEDO", "ESCASSEZ", "CONTROLE", "JUROS", "ANSIEDADE"], 
            rise: ["TEMPO", "CRIAÇÃO", "SEGURANÇA", "ABUNDÂNCIA", "SIMBIOSE", "HARMONIA"] 
        },
        // Adicione as outras línguas aqui seguindo o mesmo padrão...
        // Fallback para EN (para brevidade, mas as 10 línguas devem estar aqui)
    };

    const userLang = navigator.language.split('-')[0] || 'en';
    const langData = content[userLang] || content.en;

    // 2. Lógica de Gravidade (Matter.js)
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
    });

    const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, { isStatic: true, render: { visible: false } });
    Composite.add(world, ground);

    let fallenBodies = [];
    let riseBodies = [];

    function createWordBody(text, x, y, isStatic, color, fontSize) {
        const canvas = document.createElement('canvas');
        canvas.width = text.length * fontSize * 1.1;
        canvas.height = fontSize * 2;
        const ctx = canvas.getContext('2d');
        ctx.font = `bold ${fontSize}px 'Courier New'`;
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.shadowColor = color; ctx.shadowBlur = 10;
        ctx.fillText(text, canvas.width / 2, fontSize * 1.3);

        return Bodies.rectangle(x, y, canvas.width, canvas.height, {
            render: { sprite: { texture: canvas.toDataURL() } },
            restitution: 0.3, friction: 0.1, frictionAir: isStatic ? 0.05 : 0.01,
            isStatic: isStatic, label: text, isDor: !isStatic // Identificador
        });
    }

    // 📡 Sequência do Terminal
    function showText(id, delay) {
        setTimeout(() => document.getElementById(id).classList.add('visible'), delay);
    }

    // --- CICLO I: A DOR DESPENCA ---
    showText('l1', 500);
    showText('l2', 1500);
    showText('l3', 2500);
    showText('l4', 3500);

    // Iniciar queda das palavras de dor
    setTimeout(() => {
        langData.fall.forEach((word, index) => {
            setTimeout(() => {
                const body = createWordBody(word, Math.random() * (window.innerWidth - 100) + 50, -50, false, '#ff4141', 26); // Vermelho da dor
                body.restitution = 0.6; // Kica mais
                fallenBodies.push(body);
                Composite.add(world, body);
            }, index * 600);
        });
    }, 4500);

    // --- CICLO II: O VETO CINÉTICO INTERATIVO ---
    // Detectar cliques nas palavras de dor
    render.canvas.addEventListener('mousedown', function(event) {
        const mousePosition = { x: event.clientX, y: event.clientY };
        const clickedBody = fallenBodies.find(body => Matter.Bounds.contains(body.bounds, mousePosition));

        if (clickedBody) {
            // Explodir a palavra (remover do mundo e criar partículas)
            Composite.remove(world, clickedBody);
            fallenBodies = fallenBodies.filter(b => b !== clickedBody);
            spawnParticles(clickedBody.position.x, clickedBody.position.y);
            
            checkVictory();
        }
    });

    function spawnParticles(x, y) {
        for (let i = 0; i < 20; i++) {
            const particle = Bodies.circle(x, y, 3, {
                render: { fillStyle: '#00ff41' },
                frictionAir: 0.03,
                collisionFilter: { group: -1 } // Não colidir com outras
            });
            Composite.add(world, particle);
            setTimeout(() => Composite.remove(world, particle), 1500); // Somem depois
        }
    }

    // --- CICLO III: A GÊNESE DO FUTURO ---
    let victoryChecked = false;
    function checkVictory() {
        if (fallenBodies.length === 0 && !victoryChecked) {
            victoryChecked = true;
            triggerRise();
        }
    }

    function triggerRise() {
        // Mudar Terminal
        document.getElementById('l3').innerHTML = `> [ STATUS: <span class="highlight">PASSADO NEUTRALIZADO</span> ]`;
        document.getElementById('l4').innerHTML = `> [ GÊNESE: O FUTURO ESTÁ SENDO INSTALADO ]`;

        // Iniciar subida das palavras de futuro
        langData.rise.forEach((word, index) => {
            setTimeout(() => {
                const body = createWordBody(word, Math.random() * (window.innerWidth - 150) + 75, window.innerHeight + 100, false, '#00ff41', 28);
                body.isStatic = false; // Elas flutuam
                body.force = { x: 0, y: -0.1 }; // Força para cima
                Composite.add(world, body);
                riseBodies.push(body);
            }, index * 800);
        });

        // Evento para fazer elas flutuarem
        Events.on(engine, 'afterUpdate', () => {
            riseBodies.forEach(body => {
                Matter.Body.applyForce(body, body.position, { x: 0, y: -0.005 });
                if (body.position.y < -100) body.position.y = window.innerHeight + 100; // Loop se subir demais
            });
        });

        // Mostrar Botão Final
        setTimeout(() => {
            document.getElementById('confirm-btn').style.display = 'block';
        }, 6000);
    }

    Render.run(render);
    Runner.run(Runner.create(), engine);

    // Botão que leva ao Manifesto (PDF ou MD)
    document.getElementById('confirm-btn').addEventListener('click', () => {
        window.location.href = 'manifesto_en.pdf'; // Mudar para o PDF ou página MD
    });
</script>

</body>
</html>
