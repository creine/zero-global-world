<style>
:root{--bg:#fff;--text:#1a1a1a;--accent:#3b82f6;--dim:#71717a;--hl-grad:linear-gradient(135deg,#06b6d4,#3b82f6);--hope-grad:linear-gradient(45deg,#2ecc71,#3498db);--brand-grad:linear-gradient(90deg, #06b6d4, #3b82f6, #06b6d4)}
*{margin:0;padding:0;box-sizing:border-box;outline:0}
html,body{height:100dvh;width:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}

#_P_BAR{position:fixed;top:0;left:0;height:5px;background:var(--hl-grad);width:0;transition:width 0.4s ease;z-index:2500}
#_LANG_UI{position:fixed;top:15px;right:15px;z-index:3000}
#_L_SEL{background:rgba(255,255,255,0.8);border:1px solid #eee;padding:8px 12px;border-radius:30px;font-size:11px;font-weight:800;cursor:pointer;backdrop-filter:blur(10px);text-transform:uppercase}

#_M{max-width:850px;margin:0 auto;height:100dvh;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;position:relative;z-index:10;display:flex;flex-direction:column}
section._step_sec{display:none;opacity:0;min-height:100%;flex-direction:column;transition:opacity 0.6s ease}
section._step_sec.active{display:flex;opacity:1}

._header_sticky{position:sticky;top:0;background:rgba(255,255,255,0.95);padding:60px 25px 20px;z-index:100;backdrop-filter:blur(5px)}
h1{font-size:3rem;font-weight:800;letter-spacing:-3px;line-height:1;margin-bottom:10px}
h2{font-size:1.6rem;font-weight:600;color:var(--dim);letter-spacing:-1px}

._content_scroll{padding:20px 25px 120px;flex-grow:1}
p{font-size:1.4rem;line-height:1.5;color:var(--dim);font-weight:300}

._footer_sticky{position:sticky;bottom:0;width:100%;padding:20px 25px 40px;background:linear-gradient(to top, #fff 75%, transparent);text-align:center;z-index:100}

.brand{font-weight:900;background:var(--brand-grad);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite;display:inline-block;letter-spacing:-1px}
@keyframes shine{to{background-position:200% center}}

.btn{display:inline-block;padding:22px 50px;background:var(--text);color:var(--bg);text-decoration:none;border-radius:100px;font-weight:700;font-size:0.9rem;letter-spacing:1px;text-transform:uppercase;transition:all .4s ease;cursor:pointer;border:0;box-shadow:0 15px 30px rgba(0,0,0,0.1);width:100%;max-width:400px}
.btn:hover{transform:translateY(-3px);box-shadow:0 25px 50px rgba(0,0,0,0.15)}
.btn-sec{background:transparent;color:var(--text);border:2px solid #ddd;box-shadow:none;margin-top:10px}

#_SHARE_STATE{display:none;opacity:0;text-align:center;padding:100px 25px}
#_S_BOX{background:#f9f9f9;padding:30px;border-radius:35px;margin-bottom:20px;border:1px solid #eee}
#_ST{width:100%;height:120px;background:#fff;border:1px solid #ddd;border-radius:15px;padding:15px;font-size:1rem;margin-bottom:15px;resize:none;font-family:inherit;color:var(--dim);line-height:1.4}

#_FULL_MANIFESTO{display:none;opacity:0;padding:80px 25px;text-align:left}
._cap_full{margin-bottom:80px}
._cap_full h3{font-size:2.6rem;font-weight:800;margin-bottom:12px;letter-spacing:-2px;line-height:1}
._cap_full h4{font-size:1.4rem;font-weight:600;color:var(--dim);margin-bottom:25px}
._cap_full p{font-size:1.3rem;margin-bottom:25px;color:var(--text)}

@media (max-width:768px){
    h1{font-size:2.2rem}
    h2{font-size:1.2rem}
    p{font-size:1.15rem}
    ._header_sticky{padding-top:80px}
    ._footer_sticky{padding-bottom:30px}
}
[dir="rtl"] #_LANG_UI{right:auto;left:15px}
</style>

<script>
(function(){
const _D={
    pt:{full:"O MANIFESTO PELA SOBERANIA HUMANA",s:[{h:"Capítulo I",sub:"A Esteira Infinita",p:"Sabe aquele cansaço que parece não ter fim? Você acorda, trabalha, volta para casa e, no final do mês, a conta mal fecha. Não é falta de esforço. É que você está em uma esteira que acelera a cada dia. Ensinaram a você que o segredo do sucesso é o suor, mas o sistema atual foi desenhado para que o seu suor apenas mantenha o motor de quem já tem tudo funcionando.<br><br>Mentiram para você. Você não está correndo para vencer; está correndo apenas para não cair. O sistema não quer que você chegue lá; ele quer que você nunca pare de correr, sacrificando o tempo com quem você ama e a sua própria saúde em troca de sobrevivência.",b:"QUEM ESTÁ NO COMANDO?"},{h:"Capítulo II",sub:"O Motor Invisível",p:"Você pode até não usar uma inteligência artificial no seu dia a dia, mas o mundo em volta de você já usa. As fábricas, os bancos e as grandes empresas agora usam 'motores inteligentes' que trabalham por milhares de pessoas ao mesmo tempo.<br><br>Imagine que uma plantação inteira agora é colhida por uma única máquina que não se cansa. A comida deveria ser quase de graça e o seu trabalho deveria ser mais leve, não é? Mas o que aconteceu? O lucro fica preso no topo e você continua trabalhando as mesmas horas para comprar o que a máquina colheu. La tecnologia avançou, mas a sua vida continua pesada. Isso é um erro de lógica que nos mantém presos ao passado.",b:"A NOVA ECONOMIA"},{h:"Capítulo III",sub:"A Nova Economia",p:"O ZeroGlobal não é sobre política antiga. Não é sobre direita ou esquerda — essas são brigas que só servem para nos distrair enquanto o tempo passa. Nós propomos um novo caminho: onde a tecnologia é o nosso escudo.<br><br>Temos o dever de exigir máquinas que nos ajudem, e não que nos escravizem. O que hoje está sendo criado para gerar lucro para poucos, deve ser a base da nossa nova economia. Uma economia onde a inteligência das máquinas cuida da parte pesada para que nós tenhamos segurança, tempo para nossas famílias e educação para quem nunca teve oportunidade. É o ciclo completo que a política nunca fez: usar a inteligência para trazer paz, e não mais correria.",b:"O GRANDE CHAMADO"},{h:"Capítulo IV",sub:"O Grande Chamado",p:"A porta da gaiola está aberta, mas nós só passaremos por ela se caminharmos juntos. Esta nova fase da humanidade não vai cair do céu; ela precisa ser conquistada. O seu primeiro dever é espalhar essa verdade.<br><br>Deixe de lado as diferenças que nos dividiram por tanto tempo. Não importa em quem você votou ou no que você acredita: se você acorda exausto e sente que o seu tempo está sendo roubabdo, você é parte da nossa aliança. Conte para o seu vizinho, para a sua família, para os seus amigos que mudar é possível. A inteligência das máquinas é uma herança de todos nós, e deve ser cobrada de quem a domina para que ela trabalhe a nosso favor.<br><br>A consciência é a nossa maior arma. Quando todos souberem que a abundância já existe e que a escassez é uma escolha do sistema, a mentira perde o poder. Não guarde essa luz só para você. Seja a voz que desperta o próximo. O futuro é uma construção coletiva, e ele começa agora.",b:"ESPALHAR ESSA IDEIA"}],sh_t:"Espalhe a Consciência",sh_d:"A mudança começa quando a verdade alcança o próximo:",sum:"Você não nasceu para ser exausto. O Manifesto ZeroGlobal mostra o caminho para a tecnologia trabalhar por você, não contra você. Liberte-se: https://zeroglobal.world",cp:"COMPARTILHAR ESSA IDEIA",ok:"COPIADO!",rd:"LER MANIFESTO COMPLETO"},
    en:{full:"THE MANIFESTO FOR HUMAN SOVEREIGNTY",s:[{h:"Chapter I",sub:"The Infinite Treadmill",p:"You wake up, work, and bills barely balance. You're on a treadmill that speeds up every day. They taught you sweat is the secret, but the system fuels someone else's engine. You aren't running to win; you're running just not to fall. Reclaim your time.",b:"WHO IS IN CONTROL?"},{h:"Chapter II",sub:"The Invisible Engine",p:"Machine intelligence harvests the world's wealth. Profit stays at the top while your life remains heavy. This is a logic error that keeps us trapped. Technology advanced, but your life is still a struggle.",b:"THE NEW ECONOMY"},{h:"Chapter III",sub:"The New Economy",p:"ZeroGlobal is our shield. We must demand machines that handle the heavy lifting so we have security and time for our families. It's the cycle politics never completed: using intelligence for peace.",b:"THE GREAT CALLING"},{h:"Chapter IV",sub:"The Great Calling",p:"The cage door is open. Spread this truth. If you wake up exhausted and feel your time is stolen, you are part of our alliance. Change is possible. Consciousness is our greatest weapon. Be the voice.",b:"SHARE THIS IDEA"}],sh_t:"Spread Awareness",sh_d:"Change begins when truth reaches the next person:",sum:"You weren't born to be exhausted. The ZeroGlobal Manifesto shows how technology can work for you, not against you. Reclaim your freedom: https://zeroglobal.world",cp:"SHARE THIS IDEA",ok:"COPIED!",rd:"READ FULL MANIFESTO"},
    es:{full:"EL MANIFIESTO POR LA SOBERANÍA HUMANA",s:[{h:"Capítulo I",sub:"La Cinta Infinita",p:"Te despiertas, trabajas, y las cuentas apenas cierran. Estás en una cinta que acelera cada día. Te enseñaron que el sudor es el secreto, pero el sistema actual fue diseñado para que tu esfuerzo solo alimente el motor de otros.",b:"¿QUIÉN TIENE EL CONTROL?"},{h:"Capítulo II",sub:"El Motor Invisible",p:"Hoy una plantación es cosechada por una máquina, pero el beneficio se queda arriba. La tecnología avanzó, pero tu vida sigue pesada. Es un error de lógica que nos mantiene atrapados en el pasado.",b:"LA NUEVA ECONOMÍA"},{h:"Capítulo III",sub:"La Nueva Economía",p:"ZeroGlobal es nuestro escudo. Debemos exigir máquinas que nos ayuden. Una economía donde la inteligencia trabaje para darnos seguridad y tiempo para nuestras familias.",b:"EL GRAN LLAMADO"},{h:"Capítulo IV",sub:"El Gran Llamado",p:"La puerta de la jaula está abierta. Si te despiertas agotado y sientes que te roban el tiempo, eres parte de nuestra alianza. Dile a tus amigos que el cambio es posible. El futuro comienza ahora.",b:"COMPARTIR ESTA IDEA"}],sh_t:"Difunde la Conciencia",sh_d:"El cambio comienza cuando la verdad llega al prójimo:",sum:"No naciste para vivir agotado. El Manifiesto ZeroGlobal muestra el camino para que la tecnología trabaje para ti, no contra ti. Libérate: https://zeroglobal.world",cp:"COMPARTIR ESTA IDEA",ok:"¡COPIADO!",rd:"LEER MANIFIESTO COMPLETO"},
    fr:{full:"LE MANIFESTE POUR LA SOUVERAINETÉ HUMAINE",s:[{h:"Chapitre I",sub:"Le Tapis Roulant",p:"Vous êtes sur un tapis roulant qui accélère chaque jour. On vous a menti : le système est conçu pour que votre effort n'alimente que le moteur de ceux qui ont déjà tout. Vous courez pour ne pas tomber.",b:"QUI EST AUX COMMANDES ?"},{h:"Chapitre II",sub:"Le Moteur Invisible",p:"L'IA travaille déjà partout. La nourriture devrait être libre, mais le profit reste au sommet. C'est une erreur de logique qui nous maintient dans le passé. Votre vie reste lourde malgré les progrès.",b:"LA NOUVELLE ÉCONOMIE"},{h:"Capitre III",sub:"La Nouvelle Économie",p:"ZeroGlobal est notre bouclier. Exigeons des machines qu'elles s'occupent du travail lourd pour nous rendre notre temps. C'est le cycle que la politique n'a jamais réalisé.",b:"LE GRAND APPEL"},{h:"Chapitre IV",sub:"Le Grand Appel",p:"La porte est ouverte. Votre devoir est de propager cette vérité. Si vous êtes épuisé, vous faites partie de notre alliance. Soyez la voix qui réveille le prochain. L'avenir commence maintenant.",b:"PARTAGER CETTE IDÉE"}],sh_t:"Partagez la Conscience",sh_d:"Le changement commence quand la vérité atteint le suivant :",sum:"Vous n'êtes pas né pour être épuisé. Le Manifeste ZeroGlobal montre comment la technologie peut travailler pour vous, pas contre vous. Libérez-vous : https://zeroglobal.world",cp:"PARTAGER CETTE IDÉE",ok:"COPIÉ !",rd:"LIRE LE MANIFESTE COMPLET"},
    de:{full:"DAS MANIFEST FÜR MENSCHLICHE SOUVERÄNITÄT",s:[{h:"Kapitel I",sub:"Das Hamsterrad",p:"Kennen Sie diese Erschöpfung? Sie sind in einem Hamsterrad, das jeden Tag schneller wird. Man hat Sie belogen: Das System wurde so konzipiert, dass Ihre Anstrengung nur den Motor derer antreibt, die bereits alles haben.",b:"WER HAT DIE KONTROLLE?"},{h:"Kapitel II",sub:"Der unsichtbare Motor",p:"KI arbeitet bereits überall. Lebensmittel sollten fast kostenlos sein, aber der Profit bleibt oben. Die Technik ist fortgeschritten, aber Ihr Leben bleibt schwer. Das ist ein Logikfehler.",b:"DIE NEUE ÖKONOMIE"},{h:"Kapitel III",sub:"Die neue Ökonomie",p:"ZeroGlobal ist unser Schutzschild. Maschinen müssen uns helfen, nicht versklaven. Eine Wirtschaft, in der Maschinenintelligenz die schwere Arbeit übernimmt.",b:"DER GROSSE AUFRUF"},{h:"Kapitel IV",sub:"Der große Aufruf",p:"Die Käfigtür steht offen. Wenn Sie erschöpft aufwachen, sind Sie Teil unserer Allianz. Sagen Sie Ihren Freunden: Veränderung ist möglich. Bewusstsein ist unsere stärkste Waffe.",b:"DIESE IDEE TEILEN"}],sh_t:"Bewusstsein verbreiten",sh_d:"Wandel beginnt, wenn die Wahrheit den Nächsten erreicht:",sum:"Du bist nicht geboren, um erschöpft zu sein. Das ZeroGlobal Manifest zeigt den Weg, wie Technologie für dich arbeitet, nicht gegen dich. https://zeroglobal.world",cp:"DIESE IDEE TEILEN",ok:"KOPIERT!",rd:"VOLLSTÄNDIGES MANIFEST LESEN"},
    it:{full:"IL MANIFESTO PER LA SOVRANITÀ UMANA",s:[{h:"Capitolo I",sub:"Il Tapis Roulant",p:"Ti hanno mentito: il sistema è progettato perché il tuo sforzo alimenti solo il motore di chi ha già tutto. Non stai correndo per vincere; stai correndo solo per non cadere.",b:"CHI HA IL CONTROLLO?"},{h:"Capitolo II",sub:"Il Motore Invisibile",p:"L'IA lavora già ovunque. Il cibo dovrebbe essere gratis, ma il profitto resta in cima. La tecnologia è progredita, ma la tua vita resta pesante. È un errore logico.",b:"LA NUOVA ECONOMIA"},{h:"Capitolo III",sub:"La Nuova Economia",p:"ZeroGlobal è il nostro scudo. Esigiamo macchine che si occupino del lavoro pesante affinché abbiamo tempo per le nostre famiglie. È la via per la pace.",b:"IL GRANDE APPELLO"},{h:"Capitolo IV",sub:"Il Grande Appello",p:"La porta è aperta. Se ti svegli esausto, fai parte della nostra alleanza. Di' alla tua famiglia che il cambiamento è possibile. Il futuro inizia ora.",b:"CONDIVIDI QUESTA IDEA"}],sh_t:"Diffondi la Consapevolezza",sh_d:"Il cambiamento inizia quando la verità raggiunge il prossimo:",sum:"Non sei nato per vivere esausto. Il Manifesto ZeroGlobal rivela come la tecnologia può lavorare per te, non contro di te. Liberati: https://zeroglobal.world",cp:"CONDIVIDI QUESTA IDEA",ok:"COPIATO!",rd:"LEGGI MANIFESTO COMPLETO"},
    zh:{full:"人类主权宣言",s:[{h:"第一章",sub:"无限跑步机",p:"他们骗了你：系统设计的初衷就是让你的努力维持那些富有者的引擎运转。你奔跑不是为了赢，而仅仅是为了不摔倒。牺牲健康换取生存。",b:"谁在掌控？"},{h:"第二章",sub:"无形的引擎",p:"人工智能已经在运行。农田由机器收割，食物本应免费，但利润被困在顶层。技术进步了，生活依然沉重。这是逻辑错误。",b:"新经济"},{h:"第三章",sub:"新经济",p:"ZeroGlobal 技术应是我们的盾牌。我们必须要求机器处理沉重的工作，让我们拥有安全感和时间。利用智能带来和平。",b:"伟大的号召"},{h:"第四章",sub:"伟大的号召",p:"笼门已开。如果你感到精疲力竭，你就是我们联盟的一员。改变是可能的。意识是我们最强大的武器。未来始于当下。",b:"分享这个想法"}],sh_t:"传播意识",sh_d:"当真理触及下一个人时，改变就开始了：",sum:"你不是为了疲惫而生的。ZeroGlobal 宣言揭示了让技术为你服务而非对抗你的路径。获得自由：https://zeroglobal.world",cp:"分享这个想法",ok:"已复制！",rd:"阅读完整宣言"},
    jp:{full:"人類の主権のための宣言",s:[{h:"第一章",sub:"トレッドミル",p:"汗が成功の秘訣だと教えられましたが、今のシステムは、あなたの努力が他人のエンジンを回すためだけに設計されています。あなたは落ちないために走っているだけなのです。",b:"誰がコントロールしているのか？"},{h:"第二章",sub:"見えないエンジン",p:"AIはすでに世界を動かしています。農場が一台の機械で収穫されるなら、食料は無料になるはずです。利益はトップに留まり、生活は重いまま。これは論理的な誤りです。",b:"新しい経済"},{h:"第三章",sub:"新しい経済",p:"ZeroGlobal は技術を私たちの盾に。奴隷ではなく、私たちを助ける機械を要求する義務があります。機械の知能が重労働を担う経済です。",b:"大いなる呼びかけ"},{h:"第四章",sub:"大いなる呼びかけ",p:"檻のドアは開いています。疲れ果てているなら、あなたは私たちの同盟の一員です。変化は可能だと周囲に伝えてください。未来は今始まります。",b:"このアイデアを共有する"}],sh_t:"意識を広める",sh_d:"真実が隣人に伝わるとき、変化が始まります：",sum:"あなたは疲弊するために生まれてきたのではありません。ZeroGlobal マニフェストは、技術をあなたのために働かせる道を示します。 https://zeroglobal.world",cp:"このアイデアを共有する",ok:"コピーしました！",rd:"宣言全文を読む"},
    ru:{full:"МАНИФЕСТ ЗА ЧЕЛОВЕЧЕСКИЙ СУВЕРЕНИТЕТ",s:[{h:"Глава I",sub:"Беговая дорожка",p:"Вам лгали: система создана так, чтобы ваши усилия питали только тех, у кого всё есть. Вы бежите не для того, чтобы победить; вы бежите просто для того, чтобы не упасть.",b:"КТО У РУЛЯ?"},{h:"Глава II",sub:"Невидимый двигатель",p:"ИИ уже работает. Еда должна быть почти бесплатной, но прибыль остается наверху. Технологии шагнули вперед, но жизнь остается тяжелой. Это логическая ошибка.",b:"НОВАЯ ЭКОНОМИКА"},{h:"Глава III",sub:"Новая экономика",p:"ZeroGlobal — это наш щит. Мы должны требовать, чтобы машины обеспечивали нашу безопасность и время. Экономика, где ИИ берет на себя тяжелый труд.",b:"ВЕЛИКИЙ ПРИЗЫВ"},{h:"Глава IV",sub:"Великий призыв",p:"Дверь клетки открыта. Если вы истощены, вы — часть нашего альянса. Перемены возможны. Осознанность — наше главное оружие. Будущее начинается сейчас.",b:"ПОДЕЛИТЬСЯ ИДЕЕЙ"}],sh_t:"Распространите осознанность",sh_d:"Перемены начинаются, когда истина доходит до ближнего:",sum:"Вы не родились для истощения. Манифест ZeroGlobal показывает путь, как заставить технологии работать на вас, а не против вас. https://zeroglobal.world",cp:"ПОДЕЛИТЬSЯ ИДЕЕЙ",ok:"СКОПИРОВАНО!",rd:"ЧИТАТЬ ПОЛНЫЙ МАНИФЕСТ"},
    ar:{full:"بيان السيادة البشرية",s:[{h:"الفصل الأول",sub:"جهاز المشي",p:"لقد كذبوا عليك: النظام صُمم لخدمة من يملكون كل شيء فقط. أنت لا تركض لتفوز؛ أنت تركض فقط لكي لا تسقط مضحياً بصحتك من أجل البقاء.",b:"من المتحكم؟"},{h:"الفصل الثاني",sub:"المحرك الخفي",p:"الذكاء الاصطناعي يعمل بالفعل. يجب أن يكون الطعام مجانياً، لكن الربح يبقى في القمة. تقدمت التكنولوجيا وبقيت حياتك ثقيلة. هذا خطأ منطقي.",b:"الاقتصاد الجديد"},{h:"الفصل الثالث",sub:"الاقتصاد الجديد",p:"ZeroGlobal التكنولوجيا درعنا. علينا المطالبة بآلات توفر لنا الوقت والأمان وتتولى العمل الشاق. هذا هو المسار للسلام.",b:"النداء العظيم"},{h:"الفصل الرابع",sub:"النداء العظيم",p:"باب القفص مفتوح. إذا كنت مرهقاً، فأنت جزء من تحالفنا. أخبر عائلتك أن التغيير ممكن. الوعي هو سلاحنا الأكبر. المستقبل يبدأ الآن.",b:"انشر هذه الفكرة"}],sh_t:"انشر الوعي",sh_d:"يبدأ التغيير عندما تصل الحقيقة للآخرين:",sum:"لم تولد لتعيش مرهقاً. يكشف بيان ZeroGlobal عن الطريق لجعل التكنولوجيا تعمل من أجلك، وليس ضدك. تحرر: https://zeroglobal.world",cp:"انشر هذه الفكرة",ok:"تم النسخ!",rd:"اقرأ البيان كاملاً"}
