*{margin:0;padding:0;box-sizing:border-box;outline:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
#_P_BAR{position:fixed;top:0;left:0;height:6px;background:var(--hl-grad);width:0;transition:width 0.4s ease;z-index:1500}
#_LANG_UI{position:fixed;top:25px;right:25px;z-index:2000}
#_L_SEL{background:rgba(255,255,255,0.9);border:2px solid #eee;padding:10px 20px;border-radius:30px;font-size:12px;font-weight:800;cursor:pointer;backdrop-filter:blur(10px);text-transform:uppercase}
#_M{max-width:850px;margin:0 auto;padding:0 25px;height:100%;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:10}
section._step_sec{display:none;opacity:0;transform:translateY(30px);transition:all 0.8s cubic-bezier(0.22,1,0.36,1)}
section._step_sec.active{display:block;opacity:1;transform:translateY(0)}
h1{font-size:3.8rem;font-weight:800;letter-spacing:-3px;line-height:1;margin-bottom:15px}
h2{font-size:1.8rem;font-weight:600;color:var(--dim);margin-bottom:40px;letter-spacing:-1px}
p{font-size:1.5rem;line-height:1.6;color:var(--dim);margin-bottom:40px;font-weight:300}
.brand{font-weight:900;background:var(--brand-grad);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite;display:inline-block;letter-spacing:-1px}
@keyframes shine{to{background-position:200% center}}
.btn{display:inline-block;padding:22px 55px;background:var(--text);color:var(--bg);text-decoration:none;border-radius:100px;font-weight:700;font-size:0.9rem;letter-spacing:1px;text-transform:uppercase;transition:all .4s ease;cursor:pointer;border:0;box-shadow:0 15px 30px rgba(0,0,0,0.1);margin:10px 5px}
.btn:hover{transform:translateY(-3px);box-shadow:0 25px 50px rgba(0,0,0,0.15)}
.btn-sec{background:transparent;color:var(--text);border:2px solid #ddd;box-shadow:none;margin-top:20px}
#_SHARE_STATE{display:none;opacity:0;text-align:center;transition:opacity 0.8s ease}
#_S_BOX{background:#f9f9f9;padding:40px;border-radius:40px;margin-bottom:30px;border:1px solid #eee}
#_ST{width:100%;height:140px;background:#fff;border:1px solid #ddd;border-radius:15px;padding:20px;font-size:1.1rem;margin-bottom:20px;resize:none;font-family:inherit;color:var(--dim);line-height:1.5}
#_FULL_MANIFESTO{display:none;opacity:0;padding:120px 0;text-align:left}
._cap_full{margin-bottom:100px}
._cap_full h3{font-size:2.8rem;font-weight:800;margin-bottom:15px;letter-spacing:-2px}
._cap_full h4{font-size:1.6rem;font-weight:600;color:var(--dim);margin-bottom:35px}
._cap_full p{font-size:1.4rem;margin-bottom:35px}
@media (max-width:768px){h1{font-size:2.5rem}h2{font-size:1.3rem}p{font-size:1.2rem}#_M{padding:0 20px}}
[dir="rtl"] #_LANG_UI{right:auto;left:25px}
[dir="rtl"] h1{letter-spacing:0}

<script>
(function(){
const _D={
    pt:{s:[{h:"Capítulo I",sub:"A Esteira Infinita",p:"Sabe aquele cansaço que parece não ter fim? Você acorda, trabalha, volta para casa e, no final do mês, a conta mal fecha. Não é falta de esforço. É que você está em uma esteira que acelera a cada dia. Ensinaram a você que o segredo do sucesso é o suor, mas o sistema atual foi desenhado para que o seu suor apenas mantenha o motor de quem já tem tudo funcionando.<br><br>Mentiram para você. Você não está correndo para vencer; está correndo apenas para não cair. O sistema não quer que você chegue lá; ele quer que você nunca pare de correr, sacrificando o tempo com quem você ama e a sua própria saúde em troca de sobrevivência.",b:"QUEM ESTÁ NO COMANDO?"},{h:"Capítulo II",sub:"O Motor Invisível",p:"Você pode até não usar uma inteligência artificial no seu dia a dia, mas o mundo em volta de você já usa. As fábricas, os bancos e as grandes empresas agora usam 'motores inteligentes' que trabalham por milhares de pessoas ao mesmo tempo.<br><br>Imagine que uma plantação inteira agora é colhida por uma única máquina que não se cansa. A comida deveria ser quase de graça e o seu trabalho deveria ser mais leve, não é? Mas o que aconteceu? O lucro fica preso no topo e você continua trabalhando as mesmas horas para comprar o que a máquina colheu. A tecnologia avançou, mas a sua vida continua pesada. Isso é um erro de lógica que nos mantém presos ao passado.",b:"A NOVA ECONOMIA"},{h:"Capítulo III",sub:"A Nova Economia",p:"O ZeroGlobal não é sobre política antiga. Não é sobre direita ou esquerda — essas são brigas que só servem para nos distrair enquanto o tempo passa. Nós propomos um novo caminho: onde a tecnologia é o nosso escudo.<br><br>Temos o dever de exigir máquinas que nos ajudem, e não que nos escravizem. O que hoje está sendo criado para gerar lucro para poucos, deve ser a base da nossa nova economia. Uma economia onde a inteligência das máquinas cuida da parte pesada para que nós tenhamos segurança, tempo para nossas famílias e educação para quem nunca teve oportunidade. É o ciclo completo que a política nunca fez: usar a inteligência para trazer paz, e não mais correria.",b:"O GRANDE CHAMADO"},{h:"Capítulo IV",sub:"O Grande Chamado",p:"A porta da gaiola está aberta, mas nós só passaremos por ela se caminharmos juntos. Esta nova fase da humanidade não vai cair do céu; ela precisa ser conquistada. O seu primeiro dever é espalhar essa verdade.<br><br>Deixe de lado as diferenças que nos dividiram por tanto tempo. Não importa em quem você votou ou no que você acredita: se você acorda exausto e sente que o seu tempo está sendo roubado, você é parte da nossa aliança. Conte para o seu vizinho, para a sua família, para os seus amigos que mudar é possível. A inteligência das máquinas é uma herança de todos nós, e deve ser cobrada de quem a domina para que ela trabalhe a nosso favor.<br><br>A consciência é a nossa maior arma. Quando todos souberem que a abundância já existe e que a escassez é uma escolha do sistema, a mentira perde o poder. Não guarde essa luz só para você. Seja a voz que desperta o próximo. O futuro é uma construção coletiva, e ele começa agora.",b:"ESPALHAR ESSA IDEIA"}],sh_t:"Espalhe a Consciência",sh_d:"A mudança só acontece quando a verdade atinge o próximo. Use o resumo abaixo:",sum:"Encontrei a saída da esteira. O Manifesto ZeroGlobal revela como a tecnologia pode devolver nosso tempo e dar segurança às nossas famílias. O futuro depende de todos nós sabermos disso. Leia e liberte-se: https://zeroglobal.world",cp:"COMPARTILHAR ESSA IDEIA",ok:"COPIADO!",rd:"LER MANIFESTO COMPLETO",full:"O MANIFESTO PELA SOBERANIA HUMANA"},
    en:{s:[{h:"Chapter I",sub:"The Infinite Treadmill",p:"You know that exhaustion that seems to have no end? You wake up, work, go home, and at the end of the month, the bills barely balance. It's not lack of effort. You're on a treadmill that speeds up every day. They taught you that the secret to success is sweat, but the current system was designed so your effort only fuels the engine of those who already have everything.<br><br>They lied to you. You aren't running to win; you're running just not to fall. The system doesn't want you to get there; it wants you never to stop running, sacrificing time with those you love and your own health for survival.",b:"WHO IS IN CONTROL?"},{h:"Chapter II",sub:"The Invisible Engine",p:"You might not even use AI in your daily life, but the world around you already does. Factories, banks, and big corporations now use 'intelligent engines' that work for thousands of people at the same time.<br><br>Imagine a whole plantation now harvested by a single machine that never tires. Food should be almost free and your work should be lighter, right? But what happened? Profit stays trapped at the top and you continue to work the same hours to buy what the machine harvested. Technology has advanced, but your life remains heavy. This is a logic error that keeps us trapped in the past.",b:"THE NEW ECONOMY"},{h:"Chapter III",sub:"The New Economy",p:"ZeroGlobal is not about old politics. It's not about right or left—those are fights that only serve to distract us while time passes. We propose a new path: where technology is our shield.<br><br>We have a duty to demand machines that help us, not enslave us. What is being created today to generate profit for a few must be the foundation of our new economy. An economy where machine intelligence handles the heavy lifting so we have security, time for our families, and education for those who never had the chance.",b:"THE GREAT CALLING"},{h:"Chapter IV",sub:"The Great Calling",p:"The cage door is open, but we will only pass through if we walk together. This new phase of humanity won't fall from the sky; it must be won. Your first duty is to spread this truth.<br><br>Put aside the differences that have divided us for so long. It doesn't matter who you voted for or what you believe: if you wake up exhausted and feel your time is being stolen, you are part of our alliance. Tell your neighbor, your family, your friends that change is possible.",b:"SHARE THIS IDEA"}],sh_t:"Spread the Awareness",sh_d:"Change only happens when truth reaches the next person. Use the summary below:",sum:"I found the exit from the treadmill. The ZeroGlobal Manifesto reveals how technology can return our time and secure our families. The future depends on all of us knowing this. Read and set yourself free: https://zeroglobal.world",cp:"SHARE THIS IDEA",ok:"COPIED!",rd:"READ FULL MANIFESTO",full:"THE MANIFESTO FOR HUMAN SOBERANIA"},
    es:{s:[{h:"Capítulo I",sub:"La Cinta Infinita",p:"¿Conoces ese cansancio que parece no tener fin? Te despiertas, trabajas, vuelves a casa y al final del mes, las cuentas apenas cierran. No es falta de esfuerzo. Estás en una cinta que acelera cada día. Te enseñaron que el sudor es el secreto del éxito, pero el sistema actual fue diseñado para que tu esfuerzo solo alimente el motor de quienes ya lo tienen todo.<br><br>Te mintieron. No estás corriendo para ganar; estás corriendo solo para no caer. El sistema no quiere que llegues; quiere que nunca dejes de correr, sacrificando el tiempo con quienes amas y tu propia salud por la supervivencia.",b:"¿QUIÉN TIENE EL CONTROL?"},{h:"Capítulo II",sub:"El Motor Invisible",p:"Tal vez ni siquiera uses IA en tu día a día, pero el mundo que te rodea ya lo hace. Fábricas, bancos y grandes corporaciones usan ahora 'motores inteligentes' que trabajan por miles de personas a la vez.<br><br>Imagina una plantación entera cosechada por una sola máquina que nunca se cansa. La comida debería ser casi gratis y tu trabajo más ligero, ¿verdad? Pero ¿qué pasó? El beneficio se queda en la cima y tú sigues trabajando las mismas horas para comprar lo que la máquina cosechó. La tecnología avanzó, pero tu vida sigue pesada. Es un error de lógica que nos mantiene atrapados en el pasado.",b:"LA NUEVA ECONOMÍA"},{h:"Capítulo III",sub:"La Nueva Economía",p:"ZeroGlobal no se trata de política antigua. No es de derecha ni de izquierda; son peleas que solo sirven para distraernos. Proponemos un nuevo camino: donde la tecnología sea nuestro escudo.<br><br>Tenemos el deber de exigir máquinas que nos ayuden, no que nos esclavicen. Lo que hoy se crea para unos pocos debe ser la base de nuestra nueva economía. Una economía donde la inteligencia artificial se encargue del trabajo pesado para que tengamos seguridad, tiempo para nuestras familias y educación para todos.",b:"EL GRAN LLAMADO"},{h:"Capítulo IV",sub:"El Gran LLamado",p:"La puerta de la jaula está abierta, pero solo pasaremos si caminamos juntos. Esta nueva fase de la humanidad no caerá del cielo; hay que conquistarla. Tu primer deber es difundir esta verdad.<br><br>Deja de lado las diferencias que nos dividieron. No importa por quién votaste: si te despiertas agotado y sientes que te roban el tiempo, eres parte de nuestra alianza. Dile a tu vecino, a tu familia, a tus amigos que el cambio es posible.",b:"COMPARTIR ESTA IDEA"}],sh_t:"Difunde la Conciencia",sh_d:"El cambio solo ocurre cuando la verdad llega al prójimo. Usa el resumen:",sum:"Encontré la salida de la cinta. El Manifiesto ZeroGlobal revela cómo la tecnología puede devolvernos el tiempo y dar seguridad a nuestras familias. El futuro depende de que todos lo sepamos. Lee y libérate: https://zeroglobal.world",cp:"COMPARTIR ESTA IDEA",ok:"¡COPIADO!",rd:"LEER MANIFIESTO COMPLETO",full:"EL MANIFIESTO POR LA SOBERANÍA HUMANA"},
    fr:{s:[{h:"Chapitre I",sub:"Le Tapis Roulant Infini",p:"Vous connaissez cette fatigue qui semble ne jamais finir ? Vous vous réveillez, travaillez, rentrez chez vous et à la fin du mois, les comptes sont à peine équilibrés. Ce n'est pas un manque d'effort. Vous êtes sur un tapis roulant qui accélère chaque jour. On vous a appris que la sueur est le secret du succès, mais le système actuel a été conçu pour que votre effort ne serve qu'à alimenter le moteur de ceux qui ont déjà tout.<br><br>On vous a menti. Vous ne courez pas pour gagner ; vous courez juste pour ne pas tomber. Le système ne veut pas que vous arriviez ; il veut que vous ne cessiez jamais de courir, sacrifiant le temps avec ceux que vous aimez et votre propre santé pour la survie.",b:"QUI EST AUX COMMANDES ?"},{h:"Chapitre II",sub:"Le Moteur Invisible",p:"Vous n'utilisez peut-être même pas l'IA au quotidien, mais le monde autour de vous le fait déjà. Les usines, les banques et les grandes entreprises utilisent désormais des 'moteurs intelligents' qui travaillent pour des milliers de personnes à la fois.<br><br>Imaginez une plantation entière récoltée par une seule machine qui ne se fatigue jamais. La nourriture devrait être presque gratuite et votre travail plus léger, n'est-ce pas ? Mais que s'est-il passé ? Le profit reste bloqué au sommet et vous continuez à travailler les mêmes heures pour acheter ce que la machine a récolté. La technologie a progressé, mais votre vie reste lourde. C'est une erreur de logique qui nous maintient piégés dans le passé.",b:"LA NOUVELLE ÉCONOMIE"},{h:"Chapitre III",sub:"La Nouvelle Économie",p:"ZeroGlobal ne concerne pas la vieille politique. Il ne s'agit pas de droite ou de gauche — ce sont des querelles qui ne servent qu'à nous distraire. Nous proposons une nouvelle voie : où la technologie est notre bouclier.<br><br>Nous avons le devoir d'exiger des machines qu'elles nous aident, pas qu'elles nous asservissent. Ce qui est créé aujourd'hui pour le profit de quelques-uns doit être le fondement de notre nouvelle économie. Une économie où l'intelligence des machines s'occupe du travail lourd pour que nous ayons la sécurité, du temps pour nos familles et l'éducation pour tous.",b:"LE GRAND APPEL"},{h:"Chapitre IV",sub:"Le Grand Appel",p:"La porte de la cage est ouverte, mais nous ne la franchirons que si nous marchons ensemble. Cette nouvelle phase de l'humanité ne tombera pas du ciel ; elle doit être conquise. Votre premier devoir est de propager cette vérité.<br><br>Mettez de côté les différences qui nous ont divisés si longtemps. Peu importe pour qui vous avez voté : si vous vous réveillez épuisé et sentez que votre temps est volé, vous faites partie de notre alliance. Dites à votre voisin, à votre famille, à vos amis que le changement est possible.",b:"PARTAGER CETTE IDÉE"}],sh_t:"Diffusez la Conscience",sh_d:"Le changement ne survient que lorsque la vérité atteint le prochain. Utilisez le résumé :",sum:"J'ai trouvé la sortie du tapis roulant. Le Manifeste ZeroGlobal révèle comment la technologie peut nous rendre notre temps et sécuriser nos familles. L'avenir dépend de notre prise de conscience à tous. Lisez et libérez-vous : https://zeroglobal.world",cp:"PARTAGER CETTE IDÉE",ok:"COPIÉ !",rd:"LIRE LE MANIFESTE COMPLET",full:"LE MANIFESTE POUR LA SOUVERAINETÉ HUMAINE"},
    de:{s:[{h:"Kapitel I",sub:"Das unendliche Hamsterrad",p:"Kennen Sie diese Erschöpfung, die kein Ende zu nehmen scheint? Sie wachen auf, arbeiten, gehen nach Hause, und am Ende des Monats geht die Rechnung kaum auf. Es liegt nicht an mangelnder Anstrengung. Sie befinden sich in einem Hamsterrad, das jeden Tag schneller wird. Man hat Ihnen beigebracht, dass Schweiß das Geheimnis des Erfolgs ist, aber das aktuelle System wurde so konzipiert, dass Ihre Anstrengung nur den Motor derer antreibt, die bereits alles haben.<br><br>Man hat Sie belogen. Sie laufen nicht, um zu gewinnen; Sie laufen nur, um nicht zu fallen. Das System will nicht, dass Sie ankommen; es will, dass Sie niemals aufhören zu laufen und dabei die Zeit mit Ihren Lieben und Ihre eigene Gesundheit für das bloße Überleben opfern.",b:"WER HAT DIE KONTROLLE?"},{h:"Kapitel II",sub:"Der unsichtbare Motor",p:"Vielleicht nutzen Sie KI in Ihrem Alltag noch gar nicht, aber die Welt um Sie herum tut es bereits. Fabriken, Banken und große Konzerne nutzen heute 'intelligente Motoren', die für Tausende von Menschen gleichzeitig arbeiten.<br><br>Stellen Sie sich vor, eine ganze Plantage wird heute von einer einzigen Maschine geerntet, die niemals müde wird. Lebensmittel sollten fast kostenlos und Ihre Arbeit leichter sein, oder? Aber was ist passiert? Der Profit bleibt oben hängen, und Sie arbeiten weiterhin die gleichen Stunden, um das zu kaufen, was die Maschine geerntet hat. Die Technik ist fortgeschritten, aber Ihr Leben bleibt schwer. Das ist ein Logikfehler, der uns in der Vergangenheit gefangen hält.",b:"DIE NEUE ÖKONOMIE"},{h:"Kapitel III",sub:"Die neue Ökonomie",p:"ZeroGlobal geht nicht um alte Politik. Es geht nicht um rechts oder links – das sind nur Kämpfe, die uns ablenken sollen. Wir schlagen einen neuen Weg vor: wo Technologie unser Schutzschild ist.<br><br>Wir haben die Pflicht, Maschinen zu fordern, die uns helfen und uns nicht versklaven. Was heute für den Profit einiger Weniger geschaffen wird, muss das Fundament unserer neuen Wirtschaft sein. Eine Wirtschaft, in der Maschinenintelligenz die schwere Arbeit übernimmt, damit wir Sicherheit, Zeit für unsere Familien und Bildung für alle haben.",b:"DER GROSSE AUFRUF"},{h:"Kapitel IV",sub:"Der große Aufruf",p:"Die Käfigtür steht offen, aber wir werden sie nur gemeinsam durchschreiten. Diese neue Phase der Menschheit wird nicht vom Himmel fallen; sie muss erkämpft werden. Ihre erste Pflicht ist es, diese Wahrheit zu verbreiten.<br><br>Legen Sie die Differenzen beiseite, die uns so lange getrennt haben. Es ist egal, wen Sie gewählt haben: Wenn Sie erschöpft aufwachen und spüren, dass Ihre Zeit gestohlen wird, sind Sie Teil unserer Allianz. Sagen Sie Ihrem Nachbarn, Ihrer Familie, Ihren Freunden, dass Veränderung möglich ist.",b:"DIESE IDEE TEILEN"}],sh_t:"Bewusstsein verbreiten",sh_d:"Veränderung geschieht nur, wenn die Wahrheit den Nächsten erreicht. Nutzen Sie die Zusammenfassung:",sum:"Ich habe den Ausweg aus dem Hamsterrad gefunden. Das ZeroGlobal Manifest zeigt, wie Technologie uns unsere Zeit zurückgeben und unseren Familien Sicherheit geben kann. Die Zukunft hängt davon ab, dass wir alle es wissen. Lesen und befreien Sie sich: https://zeroglobal.world",cp:"DIESE IDEE TEILEN",ok:"KOPIERT!",rd:"VOLLSTÄNDIGES MANIFEST LESEN",full:"DAS MANIFEST FÜR MENSCHLICHE SOUVERÄNITÄT"},
    it:{s:[{h:"Capitolo I",sub:"Il Tapis Roulant Infinito",p:"Conosci quella stanchezza che sembra non finire mai? Ti svegli, lavori, torni a casa e alla fine del mese i conti tornano a malapena. Non è mancanza di impegno. Sei su un tapis roulant che accelera ogni giorno. Ti hanno insegnato che il sudore è il segreto del successo, ma il sistema attuale è stato progettato affinché il tuo sforzo alimenti solo il motore di chi ha già tutto.<br><br>Ti hanno mentito. Non stai correndo per vincere; stai correndo solo per non cadere. Il sistema non vuole che tu arrivi; vuole che tu non smetta mai di correre, sacrificando il tempo con chi ami e la tua salute per la sopravvivenza.",b:"CHI HA IL CONTROLLO?"},{h:"Capitolo II",sub:"Il Motore Invisibile",p:"Forse non usi ancora l'IA nella tua vita quotidiana, mas il mondo intorno a te lo fa già. Fabbriche, banche e grandi multinazionali usano ormai 'motori intelligenti' che lavorano per migliaia di persone contemporaneamente.<br><br>Immagina un'intera piantagione raccolta da un'unica macchina che non si stanca mai. Il cibo dovrebbe essere quasi gratis e il tuo lavoro più leggero, giusto? Ma cosa è successo? Il profitto resta bloccato in cima e tu continui a lavorare le stesse ore per comprare ciò che la macchina ha raccolto. La tecnologia è progredita, ma la tua vita resta pesante. È un errore logico che ci tiene intrappolati nel passato.",b:"LA NUOVA ECONOMIA"},{h:"Capitolo III",sub:"La Nuova Economia",p:"ZeroGlobal non riguarda la vecchia politica. Non si tratta di destra o sinistra — sono lotte che servono solo a distrarci. Proponiamo una nuova via: dove la tecnologia è il nostro scudo.<br><br>Abbiamo il dovere di esigere macchine che ci aiutino, non che ci schiavizzino. Ciò que viene creato oggi per il profitto di pochi deve essere la base della nostra nuova economia. Un'economia in cui l'intelligenza delle macchine si occupi del lavoro pesante affinché abbiamo sicurezza, tempo per le nostre famiglie e istruzione per tutti.",b:"IL GRANDE APPELLO"},{h:"Capitolo IV",sub:"Il Grande Appello",p:"La porta della gabbia è aperta, ma la varcheremo solo se cammineremo insieme. Questa nuova fase dell'umanità non cadrà dal cielo; deve essere conquistata. Il tuo primo dovere è diffondere questa verità.<br><br>Metti da parte le differenze che ci hanno diviso così a lungo. Non importa per chi hai votato: se ti svegli esausto e senti che il tuo tempo viene rubato, fai parte della nostra alleanza. Di' al tuo vicino, alla tua famiglia, ai tuoi amici che il cambiamento è possibile.",b:"CONDIVIDI QUESTA IDEA"}],sh_t:"Diffondi la Consapevolezza",sh_d:"Il cambiamento avviene solo quando la verità raggiunge il prossimo. Usa il riassunto:",sum:"Ho trovato l'uscita dal tapis roulant. Il Manifesto ZeroGlobal rivela come la tecnologia può restituirci il nostro tempo e dare sicurezza alle nostre famiglie. Il futuro dipende dalla consapevolezza di tutti. Leggi e liberati: https://zeroglobal.world",cp:"CONDIVIDI QUESTA IDEA",ok:"COPIATO!",rd:"LEGGI IL MANIFESTO COMPLETO",full:"IL MANIFESTO PER LA SOVRANITÀ UMANA"},
    zh:{s:[{h:"第一章",sub:"无尽的跑步机",p:"你是否感到那种永无止境的疲惫？你醒来、工作、回家，月底时账单勉强持平。这并不是因为你不努力。你正处在一个每天都在加速的跑步机上。他们教导你汗水是成功的秘密，但现有的系统设计初衷就是为了让你的努力仅能维持那些已经拥有一切的人的引擎运转。<br><br>他们骗了你。你不是为了赢而奔跑；你奔跑只是为了不摔倒。系统不希望你到达终点；它希望你永远不要停止奔跑，为了生存而牺牲与所爱之人相处的时间和你自己的健康。",b:"谁在掌控？"},{h:"第二章",sub:"无形的引擎",p:"你可能在日常生活中甚至还没用到人工智能，但你周围的世界已经在使用它了。工厂、银行和大型企业现在都在使用同时为数千人工作的“智能引擎”。<br><br>想象一下，现在一整片农田都由一台永远不会疲倦的机器收割。食物应该几乎是免费的，你的生活应该更轻松，对吧？但发生了什么？利润被困在顶层，而你仍然需要工作同样长的时间来购买机器收割的产品。技术进步了，但你的生活依然沉重。这是一个让我们困在过去的逻辑错误。",b:"新经济"},{h:"第三章",sub:"新经济",p:"ZeroGlobal 与旧政治无关。它不分左右——那些只是用来在我们虚度光阴时分散注意力的争斗。我们提出了一条新路径：让技术成为我们的盾牌。<br><br>我们有责任要求机器帮助我们，而不是奴役我们。今天为少数人的利益而创造的东西，必须成为我们新经济的基础。在新经济中，机器智能处理沉重的工作，让我们拥有安全感、陪伴家人的时间以及所有人的教育机会。",b:"伟大的号召"},{h:"第四章",sub:"伟大的号召",p:"笼门已经打开，但只有我们并肩同行才能走出。人类的这个新阶段不会从天而降；它必须去争取。你的首要职责就是传播这个真理。<br><br>抛开长期以来分裂我们的分歧。无论你投票给谁，无论你信仰什么：如果你醒来时感到精疲力竭，感到时间被偷走了，你就是我们联盟的一员。告诉你的邻居、家人和朋友，改变是可能的。",b:"分享这个想法"}],sh_t:"传播意识",sh_d:"只有当真理触及下一个人时，改变才会发生。请使用以下摘要：",sum:"我找到了逃离跑步机的出口。ZeroGlobal 宣言揭示了技术如何最终归还我们的时间并保障我们的家庭安全。未来取决于我们所有人的认知。阅读并获得自由：https://zeroglobal.world",cp:"分享这个想法",ok:"已复制！",rd:"阅读完整宣言",full:"人类主权宣言"},
    jp:{s:[{h:"第一章",sub:"終わりのないトレッドミル",p:"終わりのない疲労感を感じていませんか？目を覚まし、働き、家に帰り、月末には勘定がやっと合う。それは努力が足りないからではありません。あなたは毎日加速するトレッドミルの上にいるのです。汗が成功の秘訣だと教えられましたが、現在のシステムは、あなたの努力がすでにすべてを持っている人々のエンジンを動かすためだけに設計されています。<br><br>彼らはあなたに嘘をつきました。あなたは勝つために走っているのではなく、転ばないために走っているだけなのです。システムはあなたに目的地に到達してほしくありません。生存のために愛する人との時間や健康を犠牲にして、走り続けることを望んでいます。",b:"誰がコントロールしているのか？"},{h:"第二章",sub:"見えないエンジン",p:"日常生活でAIを使っていなくても、あなたの周りの世界はすでに使っています。工場、銀行、大企業は現在、数千人の代わりに同時に働く「インテリジェント・エンジン」を使用しています。<br><br>かつては多くの手が必要だった農場が、今は一台の機械で収穫される様子を想像してください。食料はほぼ無料になり、生活はもっと楽になるはずですよね？しかし、何が起きたのでしょうか。利益はトップに留まり、あなたは機械が収穫したものを買うために、相変わらず同じ時間働いています。技術は進歩しましたが、生活は重いままです。これは私たちを過去に縛り付ける論理的な誤りです。",b:"新しい経済"},{h:"第三章",sub:"新しい経済",p:"ZeroGlobal は古い政治のことではありません。右か左かということでもありません。それらは時間を浪費させるための気休めにすぎません。私たちは新しい道を提案します。技術を私たちの盾にすることです。<br><br>私たちは、自分たちを奴隷にするのではなく、助けてくれる機械を要求する義務があります。一部の人々の利益のために今日作られているものは、私たちの新しい経済の基盤でなければなりません。機械の知能が重労働を担い、私たちが安心、家族との時間、教育を享受できる経済です。",b:"大いなる呼びかけ"},{h:"第四章",sub:"大いなる呼びかけ",p:"檻のドアは開いていますが、私たちが共に歩まなければ通り抜けることはできません。人類のこの新しい段階は天から降ってくるものではなく、勝ち取らなければならないものです。あなたの第一の義務はこの真実を広めることです。<br><br>長い間私たちを分断してきた違いは横に置いてください。誰に投票したか、何を信じているかは関係ありません。疲れ果てて目を覚まし、時間が盗まれていると感じるなら、あなたは私たちの同盟の一員です。隣人、家族、友人に、変化は可能だと伝えてください。",b:"このアイデアを共有する"}],sh_t:"意識を広める",sh_d:"真実が次の人に届いたときにのみ変化は起こります。以下の要約を使用してください：",sum:"トレッドミルの出口を見つけました。ZeroGlobal 宣言は、技術がいかにして私たちの時間を取り戻し、家族に安全をもたらすかを明らかにしています。未来は私たち全員が知るかどうかにかかっています。読んで自由になりましょう：https://zeroglobal.world",cp:"このアイデアを共有する",ok:"コピーしました！",rd:"宣言全文を読む",full:"人類の主権のための宣言"},
    ru:{s:[{h:"Глава I",sub:"Бесконечная беговая дорожка",p:"Знакомо ли вам это чувство бесконечной усталости? Вы просыпаетесь, работаете, возвращаетесь домой, и в конце месяца едва сводите концы с концами. Дело не в отсутствии стараний. Вы на беговой дорожке, которая ускоряется с каждым днем. Вас учили, что пот — это секрет успеха, но нынешняя система была разработана так, чтобы ваши усилия лишь питали двигатель тех, у кого и так всё есть.<br><br>Вам лгали. Вы бежите не для того, чтобы победить; вы бежите просто для того, чтобы не упасть. Системе не нужно, чтобы вы достигли цели; она хочет, чтобы вы никогда не переставали бежать, жертвуя временем с близкими и своим здоровьем ради выживания.",b:"КТО У РУЛЯ?"},{h:"Глава II",sub:"Невидимый двигатель",p:"Возможно, вы даже не используете ИИ в повседневной жизни, но мир вокруг вас уже использует. Заводы, банки и крупные корпорации теперь используют «интеллектуальные двигатели», которые работают за тысячи людей одновременно.<br><br>Представьте, что целая плантация теперь убирается одной машиной, которая никогда не устает. Еда должна быть почти бесплатной, а ваша жизнь — легче, верно? Но что произошло? Прибыль остается наверху, а вы продолжаете работать столько же часов, чтобы купить то, что собрала машина. Технологии шагнули вперед, но ваша жизнь остается тяжелой. Это логическая ошибка, которая держит нас в прошлом.",b:"НОВАЯ ЭКОНОМИКА"},{h:"Глава III",sub:"Новая экономика",p:"ZeroGlobal — это не про старую политику. Речь не о правых или левых — это споры, которые лишь отвлекают нас. Мы предлагаем новый путь: где технологии — наш щит.<br><br>Мы обязаны требовать машины, которые помогают нам, а не порабощают нас. То, что сегодня создается ради прибыли немногих, должно стать основой нашей новой экономики. Экономики, где машинный интеллект берет на себя тяжелую работу, чтобы у нас была безопасность, время для семьи и образование для всех.",b:"ВЕЛИКИЙ ПРИЗЫВ"},{h:"Глава IV",sub:"Великий призыв",p:"Дверь клетки открыта, но мы выйдем, только если пойдем вместе. Этот новый этап человечества не упадет с неба; его нужно завоевать. Ваш первый долг — распространить эту правду.<br><br>Оставьте в стороне разногласия, которые так долго нас разделяли. Неважно, за кого вы голосовали: если вы просыпаетесь истощенным и чувствуете, что ваше время крадут, вы — часть нашего альянса. Расскажите соседу, семье, друзьям, что перемены возможны.",b:"ПОДЕЛИТЬСЯ ЭТОЙ ИДЕЕЙ"}],sh_t:"Распространите осознанность",sh_d:"Перемены происходят только тогда, когда истина доходит до ближнего. Используйте резюме:",sum:"Я нашел выход с беговой дорожки. Манифест ZeroGlobal раскрывает, как технологии могут наконец вернуть нам наше время и обеспечить безопасность нашим семьям. Будущее зависит от того, узнаем ли мы об этом все. Читайте и освобождайтесь: https://zeroglobal.world",cp:"ПОДЕЛИТЬСЯ ЭТОЙ ИДЕЕЙ",ok:"СКОПИРОВАНО!",rd:"ЧИТАТЬ ПОЛНЫЙ МАНИФЕСТ",full:"МАНИФЕСТ ЗА ЧЕЛОВЕЧЕСКИЙ СУВЕРЕНИТЕТ"},
    ar:{s:[{h:"الفصل الأول",sub:"جهاز المشي اللانهائي",p:"هل تعرف ذلك التعب الذي يبدو أنه لا ينتهي؟ تستيقظ، تعمل، وتعود إلى المنزل، وفي نهاية الشهر، لا تكاد تغطي التزاماتك. الأمر لا يتعلق بنقص الجهد. أنت على جهاز مشي يتسارع كل يوم. لقد علموك أن العرق هو سر النجاح، لكن النظام الحالي صُمم بحيث لا يغذي جهدك إلا محرك أولئك الذين يملكون كل شيء بالفعل.<br><br>لقد كذبوا عليك. أنت لا تركض لتفوز؛ أنت تركض فقط لكي لا تسقط. النظام لا يريدك أن تصل؛ يريدك ألا تتوقف عن الركض أبداً، مضحياً بوقتك مع من تحب وبصحتك من أجل البقاء فقط.",b:"من المتحكم؟"},{h:"الفصل الثاني",sub:"المحرك الخفي",p:"قد لا تستخدم الذكاء الاصطناعي في حياتك اليومية، لكن العالم من حولك يستخدمه بالفعل. المصانع والبنوك والشركات الكبرى تستخدم الآن 'محركات ذكية' تعمل بدلاً من آلاف الأشخاص في نفس الوقت.<br><br>تخيل مزرعة كاملة يتم حصادها الآن بواسطة آلة واحدة لا تتعب أبداً. يجب أن يكون الطعام مجانياً تقريباً وحياتك أخف، أليس كذلك؟ ولكن ماذا حدث؟ يبقى الربح محبوساً في القمة وأنت لا تزال تعمل نفس الساعات لتشتري ما حصدته الآلة. لقد تقدمت التكنولوجيا، لكن حياتك لا تزال ثقيلة. هذا خطأ منطقي يبقينا محاصرين في الماضي.",b:"الاقتصاد الجديد"},{h:"الفصل الثالث",sub:"الاقتصاد الجديد",p:"ZeroGlobal لا تتعلق بالسياسة القديمة. لا يتعلق الأمر باليمين أو اليسار - فهذه مجرد صراعات تعمل على تشتيت انتباهنا. نحن نقترح مساراً جديداً: حيث تكون التكنولوجيا درعنا.<br><br>علينا واجب المطالبة بآلات تساعدنا، لا تستعبدنا. ما يتم إنتاجه اليوم من أجل ربح القلة يجب أن يكون أساس اقتصادنا الجديد. اقتصاد يتولى فيه ذكاء الآلة العمل الشاق حتى نحصل على الأمان والوقت لعائلاتنا والتعليم للجميع.",b:"النداء العظيم"},{h:"الفصل الرابع",sub:"النداء العظيم",p:"باب القفص مفتوح، لكننا لن نمر منه إلا إذا سرنا معاً. هذه المرحلة الجديدة من البشرية لن تسقط من السماء؛ يجب انتزاعها. واجبك الأول هو نشر هذه الحقيقة.<br><br>ضع جانباً الخلافات التي فرقتنا طويلاً. لا يهم من انتخبت: إذا استيقظت مرهقاً وشعرت أن وقتك يُسرق، فأنت جزء من تحالفنا. أخبر جارك وعائلتك وأصدقائك أن التغيير ممكن.",b:"انشر هذه الفكرة"}],sh_t:"انشر الوعي",sh_d:"التغيير لا يحدث إلا عندما تصل الحقيقة إلى الآخرين. استخدم الملخص التالي:",sum:"لقد وجدت المخرج. يكشف بيان ZeroGlobal كيف يمكن للتكنولوجيا أن تعيد لنا وقتنا وتؤمن عائلاتنا. المستقبل يعتمد على معرفتنا جميعاً بذلك. اقرأ وتحرر: https://zeroglobal.world",cp:"انشر هذه الفكرة",ok:"تم النسخ!",rd:"اقرأ البيان كاملاً",full:"بيان السيادة البشرية"}
};

let _cL = navigator.language.split('-')[0] || 'pt';
if(!_D[_cL]) _cL = 'pt';
document.getElementById('_L_SEL').value = _cL;
if(_cL === 'ar') document.body.setAttribute('dir', 'rtl');

// Função de re-renderização completa para garantir reatividade
function _refreshUI() {
    const d = _D[_cL] || _D.pt;
    _u(_curS); // Atualiza os passos (I a IV)
    
    // Atualiza a tela de compartilhamento se estiver visível
    if (document.getElementById('_SHARE_STATE').style.display === 'block') {
        document.getElementById('_S_TIT').innerText = d.sh_t;
        document.getElementById('_S_DESC').innerText = d.sh_d;
        document.getElementById('_ST').value = d.sum;
        document.getElementById('_BCP').innerText = d.cp;
        document.getElementById('_B_READ').innerText = d.rd;
    }
    
    // Re-renderiza o manifesto completo se estiver visível
    if (document.getElementById('_FULL_MANIFESTO').style.display === 'block') {
        _renderFullContent();
    }
}

window._setL = function(l){ 
    _cL = l; 
    if(l === 'ar') document.body.setAttribute('dir', 'rtl');
    else document.body.removeAttribute('dir');
    _refreshUI(); // Chama a re-renderização total
};

let _curS = 1;

function _bnd(t){
    return t.replace(/ZeroGlobal/g, "<span class='brand'>ZeroGlobal</span>");
}

function _u(i){
    const d = _D[_cL] || _D.pt;
    const s = d.s[i-1];
    document.getElementById('h'+i+'_1').innerHTML = s.h;
    document.getElementById('sub'+i+'_1').innerHTML = s.sub;
    document.getElementById('p'+i+'_1').innerHTML = _bnd(s.p);
    document.getElementById('b'+i).innerText = s.b;
    document.getElementById('_P_BAR').style.width = (i/4*100)+'%';
}

window._n = function(n){
    const cur = document.querySelector('._step_sec.active');
    cur.style.opacity='0'; cur.style.transform='translateY(-20px)';
    setTimeout(()=>{
        cur.classList.remove('active'); _curS = n; _u(n);
        const nxt = document.getElementById('s'+n);
        nxt.classList.add('active');
        setTimeout(()=>{nxt.style.opacity='1';nxt.style.transform='translateY(0)'},50);
    },600);
};

window._showShare = function(){
    document.getElementById('s4').style.opacity='0';
    setTimeout(()=>{
        document.getElementById('s4').style.display='none';
        const sh = document.getElementById('_SHARE_STATE');
        sh.style.display='block'; setTimeout(()=>{sh.style.opacity='1'},50);
        _refreshUI(); // Garante que a tela de share carregue no idioma atual
    },600);
};

// Nova função isolada para renderizar o corpo do manifesto completo
function _renderFullContent() {
    const d = _D[_cL] || _D.pt;
    let html = `<h1 style="text-align:center; font-size:4rem; margin-bottom:120px">${d.full}</h1>`;
    d.s.forEach(cap => {
        html += `<div class="_cap_full"><h3>${cap.h}</h3><h4>${cap.sub}</h4><p>${_bnd(cap.p)}</p></div>`;
    });
    document.getElementById('_F_BODY').innerHTML = html;
}

window._revealFull = function(){
    document.body.style.overflowY = 'auto';
    document.documentElement.style.overflowY = 'auto';
    const sh = document.getElementById('_SHARE_STATE');
    const f = document.getElementById('_FULL_MANIFESTO');
    sh.style.opacity='0';
    setTimeout(()=>{
        sh.style.display='none';
        f.style.display='block'; setTimeout(()=>{f.style.opacity='1'},50);
        _renderFullContent();
        window.scrollTo(0,0);
    },600);
};

window._cp = function(){
    const t = document.getElementById('_ST');
    t.select(); navigator.clipboard.writeText(t.value);
    const d = _D[_cL] || _D.pt;
    document.getElementById('_BCP').innerText = d.ok;
    setTimeout(()=>{ document.getElementById('_BCP').innerText = d.cp; }, 2000);
};

_u(1);
})();
</script>
</body>
</html>
