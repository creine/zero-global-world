<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title id="_DT">ZEROGLOBAL.WORLD</title>
<style>
:root{--bg:#fff;--text:#1a1a1a;--accent:#3b82f6;--dim:#71717a;--hl-grad:linear-gradient(135deg,#06b6d4,#3b82f6);--hope-grad:linear-gradient(45deg,#2ecc71,#3498db);--brand-grad:linear-gradient(90deg, #06b6d4, #3b82f6, #06b6d4)}
*{margin:0;padding:0;box-sizing:border-box;outline:0}
html,body{height:100dvh;width:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}

/* UI Fixa */
#_P_BAR{position:fixed;top:0;left:0;height:6px;background:var(--hl-grad);width:0;transition:width 0.4s ease;z-index:1500}
#_LANG_UI{position:fixed;top:20px;right:20px;z-index:2000}
#_L_SEL{background:rgba(255,255,255,0.9);border:1px solid #eee;padding:10px 15px;border-radius:30px;font-size:11px;font-weight:800;cursor:pointer;backdrop-filter:blur(10px);text-transform:uppercase;outline:none}

/* Layout Centralizado Mobile-First */
#_M{max-width:850px;margin:0 auto;padding:0 25px;height:100dvh;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:10;transition:all 0.5s ease}
section._step_sec{display:none;opacity:0;transform:translateY(30px);transition:all 0.8s cubic-bezier(0.22,1,0.36,1)}
section._step_sec.active{display:block;opacity:1;transform:translateY(0)}

/* Tipografia */
h1{font-size:3.5rem;font-weight:800;letter-spacing:-3px;line-height:1;margin-bottom:15px}
h2{font-size:1.8rem;font-weight:600;color:var(--dim);margin-bottom:30px;letter-spacing:-1px}
p{font-size:1.4rem;line-height:1.5;color:var(--dim);margin-bottom:35px;font-weight:300}

.brand{font-weight:900;background:var(--brand-grad);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite;display:inline-block;letter-spacing:-1px}
@keyframes shine{to{background-position:200% center}}

/* Botões */
.btn{display:inline-block;padding:22px 50px;background:var(--text);color:var(--bg);text-decoration:none;border-radius:100px;font-weight:700;font-size:0.9rem;letter-spacing:1px;text-transform:uppercase;transition:all .4s ease;cursor:pointer;border:0;box-shadow:0 15px 30px rgba(0,0,0,0.1);margin:5px}
.btn:hover{transform:translateY(-3px);box-shadow:0 25px 50px rgba(0,0,0,0.15)}
.btn-sec{background:transparent;color:var(--text);border:2px solid #ddd;box-shadow:none;margin-top:15px}

/* Compartilhamento */
#_SHARE_STATE{display:none;opacity:0;text-align:center;transition:opacity 0.8s ease}
#_S_BOX{background:#f9f9f9;padding:30px;border-radius:35px;margin-bottom:20px;border:1px solid #eee}
#_ST{width:100%;height:120px;background:#fff;border:1px solid #ddd;border-radius:15px;padding:15px;font-size:1rem;margin-bottom:15px;resize:none;font-family:inherit;color:var(--dim);line-height:1.4}

/* Manifesto Completo - Liberar Rolagem */
#_FULL_MANIFESTO{display:none;opacity:0;padding:80px 0;text-align:left}
._cap_full{margin-bottom:80px}
._cap_full h3{font-size:2.8rem;font-weight:800;margin-bottom:12px;letter-spacing:-2px;line-height:1}
._cap_full h4{font-size:1.5rem;font-weight:600;color:var(--dim);margin-bottom:25px}
._cap_full p{font-size:1.3rem;margin-bottom:25px;color:var(--text)}

@media (max-width:768px){
    h1{font-size:2.2rem;letter-spacing:-1.5px}
    h2{font-size:1.2rem;margin-bottom:25px}
    p{font-size:1.1rem;margin-bottom:25px}
    #_M{padding:0 20px;justify-content:center}
    .btn{padding:20px 30px;width:100%;font-size:0.85rem}
    #_S_BOX{padding:25px}
    #_LANG_UI{top:15px;right:15px}
    ._cap_full h3{font-size:2rem}
    #_FULL_MANIFESTO{padding:60px 0}
}
[dir="rtl"] #_LANG_UI{right:auto;left:25px}
[dir="rtl"] h1, [dir="rtl"] h2, [dir="rtl"] ._cap_full h3{letter-spacing:0}
</style>
</head>

<div id="_LANG_UI">

    <section id="s2" class="_step_sec"><h1 id="h2_1"></h1><h2 id="sub2_1"></h2><p id="p2_1"></p><button class="btn" onclick="_n(3)" id="b2"></button></section>
    <section id="s3" class="_step_sec"><h1 id="h3_1"></h1><h2 id="sub3_1"></h2><p id="p3_1"></p><button class="btn" onclick="_n(4)" id="b3"></button></section>

        s:[
            {h:"Capítulo I",sub:"A Esteira Infinita",p:"Sabe aquele cansaço que parece não ter fim? Você acorda, trabalha, volta para casa e, no final do mês, a conta mal fecha. Não é falta de esforço. É que você está em uma esteira que acelera a cada dia. Ensinaram a você que o segredo do sucesso é o suor, mas o sistema atual foi desenhado para que o seu suor apenas mantenha o motor de quem já tem tudo funcionando.<br><br>Mentiram para você. Você não está correndo para vencer; está correndo apenas para não cair. O sistema não quer que você chegue lá; ele quer que você nunca pare de correr, sacrificando o tempo com quem você ama e a sua própria saúde em troca de sobrevivência.",b:"QUEM ESTÁ NO COMANDO?"},
            {h:"Capítulo II",sub:"O Motor Invisível",p:"Você pode até não usar uma inteligência artificial no seu dia a dia, mas o mundo em volta de você já usa. As fábricas, os bancos e as grandes empresas agora usam 'motores inteligentes' que trabalham por milhares de pessoas ao mesmo tempo.<br><br>Imagine que uma plantação inteira agora é colhida por uma única máquina que não se cansa. A comida deveria ser quase de graça e o seu trabalho deveria ser mais leve, não é? Mas o que aconteceu? O lucro fica preso no topo e você continua trabalhando as mesmas horas para comprar o que a máquina colheu. A tecnologia avançou, mas a sua vida continua pesada. Isso é um erro de lógica que nos mantém presos ao passado.",b:"A NOVA ECONOMIA"},
            {h:"Capítulo III",sub:"A Nova Economia",p:"O ZeroGlobal não é sobre política antiga. Não é sobre direita ou esquerda — essas são brigas que só servem para nos distrair enquanto o tempo passa. Nós propomos um novo caminho: onde a tecnologia é o nosso escudo.<br><br>Temos o dever de exigir máquinas que nos ajudem, e não que nos escravizem. O que hoje está sendo criado para gerar lucro para poucos, deve ser a base da nossa nova economia. Uma economia onde a inteligência das máquinas cuida da parte pesada para que nós tenhamos segurança, tempo para nossas famílias e educação para quem nunca teve oportunidade. É o ciclo completo que a política nunca fez: usar a inteligência para trazer paz, e não mais correria.",b:"O GRANDE CHAMADO"},
            {h:"Capítulo IV",sub:"O Grande Chamado",p:"A porta da gaiola está aberta, mas nós só passaremos por ela se caminharmos juntos. Esta nova fase da humanidade não vai cair do céu; ela precisa ser conquistada. O seu primeiro dever é espalhar essa verdade.<br><br>Deixe de lado as diferenças que nos dividiram por tanto tempo. Não importa em quem você votou ou no que você acredita: se você acorda exausto e sente que o seu tempo está sendo roubado, você é parte da nossa aliança. Conte para o seu vizinho, para a sua família, para os seus amigos que mudar é possível. A inteligência das máquinas é uma herança de todos nós, e deve ser cobrada de quem a domina para que ela trabalhe a nosso favor.<br><br>A consciência é a nossa maior arma. Quando todos souberem que a abundância já existe e que a escassez é uma escolha do sistema, a mentira perde o poder. Não guarde essa luz só para você. Seja a voz que desperta o próximo. O futuro é uma construção coletiva, e ele começa agora.",b:"ESPALHAR ESSA IDEIA"}

    en:{
        full:"THE MANIFESTO FOR HUMAN SOVEREIGNTY",
        s:[
            {h:"Chapter I",sub:"The Infinite Treadmill",p:"You know that exhaustion that seems to have no end? You wake up, work, go home, and at the end of the month, the bills barely balance. It's not lack of effort. You're on a treadmill that speeds up every day. They taught you that the secret to success is sweat, but the system was designed so your effort only fuels the engine of those who already have everything.<br><br>They lied to you. You aren't running to win; you're running just not to fall. The system wants you never to stop running, sacrificing time and health for survival.",b:"WHO IS IN CONTROL?"},

        s:[

    ru:{
        full:"МАНИФЕСТ ЗА ЧЕЛОВЕЧЕСКИЙ СУВЕРЕНИТЕТ",
        s:[
            {h:"Глава I",sub:"Бесконечная беговая дорожка",p:"Знакомо чувство бесконечной усталости? Вы на беговой дорожке, которая ускоряется каждый день. Вам лгали: система создана так, чтобы ваши усилия питали только тех, у кого всё есть.",b:"КТО У РУЛЯ?"},

        ],
        sh_t:"Распространите осознанность", sh_d:"Перемены начинаются, когда истина доходит до ближнего:",
        sum:"Я нашел выход. Манифест ZeroGlobal раскрывает путь к свободе. Читайте и освобождайтесь: https://zeroglobal.world",
        cp:"ПОДЕЛИТЬСЯ ИДЕЕЙ", ok:"СКОПИРОВАНО!", rd:"ЧИТАТЬ ПОЛНЫЙ МАНИФЕСТ"
    },
    ar:{
        full:"بيان السيادة البشرية",
        s:[
            {h:"الفصل الأول",sub:"جهاز المشي اللانهائي",p:"هل تشعر بالتعب اللانهائي؟ أنت على جهاز مشي يتسارع يومياً. لقد كذبوا عليك: النظام صُمم لخدمة من يملكون كل شيء فقط. أنت تركض لكي لا تسقط.",b:"من المتحكم؟"},
            {h:"الفصل الثاني",sub:"المحرك الخفي",p:"الذكاء الاصطناعي يعمل بالفعل. يجب أن يكون الطعام مجانياً، لكن الربح يبقى في القمة. تقدمت التكنولوجيا وبقيت حياتك ثقيلة. هذا خطأ منطقي.",b:"الاقتصاد الجديد"},
            {h:"الفصل الثالث",sub:"الاقتصاد الجديد",p:"ZeroGlobal لا تتعلق بالسياسة القديمة. التكنولوجيا درعنا. علينا المطالبة بآلات تساعدنا وتوفر لنا الوقت والأمان.",b:"النداء العظيم"},
            {h:"الفصل الرابع",sub:"النداء العظيم",p:"باب القفص مفتوح. واجبك نشر الحقيقة. إذا كنت مرهقاً، فأنت جزء من تحالفنا. التغيير ممكن.",b:"انشر هذه الفكرة"}
        ],
        sh_t:"انشر الوعي", sh_d:"يبدأ التغيير عندما تصل الحقيقة للآخرين:",
        sum:"لقد وجدت المخرج. بيان ZeroGlobal يكشف الطريق. اقرأ وتحرر: https://zeroglobal.world",
        cp:"انشر هذه الفكرة", ok:"تم النسخ!", rd:"اقرأ البيان كاملاً"
    }
};

let _cL = navigator.language.split('-')[0] || 'pt';
if(!_D[_cL]) _cL = 'pt';
if(window.location.hash) {
    let h = window.location.hash.substring(1);
    if(_D[h]) _cL = h;
}

document.getElementById('_L_SEL').value = _cL;
let _curS = 1;

function _bnd(t){ return t.replace(/ZeroGlobal/g, "<span class='brand'>ZeroGlobal</span>"); }

function _refreshUI() {
    const d = _D[_cL];
    _u(_curS);
    if (document.getElementById('_SHARE_STATE').style.display === 'block') {
        document.getElementById('_S_TIT').innerText = d.sh_t;
        document.getElementById('_S_DESC').innerText = d.sh_d;
        document.getElementById('_ST').value = d.sum;
        document.getElementById('_BCP').innerText = d.cp;
        document.getElementById('_B_READ').innerText = d.rd;
    }
    if (document.getElementById('_FULL_MANIFESTO').style.display === 'block') { _renderFullContent(); }
}

window._setL = function(l){ 
    _cL = l; 
    document.body.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    _refreshUI();
};

function _u(i){
    const d = _D[_cL];
    const s = d.s[i-1];
    document.getElementById('h'+i+'_1').innerHTML = s.h;
    document.getElementById('sub'+i+'_1').innerHTML = s.sub;
    document.getElementById('p'+i+'_1').innerHTML = _bnd(s.p);
    document.getElementById('b'+i).innerText = s.b;
    document.getElementById('_P_BAR').style.width = (i/4*100)+'%';
}

window._n = function(n){
    const cur = document.querySelector('._step_sec.active');
    cur.style.opacity='0'; cur.style.transform='translateY(-20px)';
    setTimeout(()=>{
        cur.classList.remove('active'); _curS = n; _u(n);
        const nxt = document.getElementById('s'+n);
        nxt.classList.add('active');
        setTimeout(()=>{nxt.style.opacity='1';nxt.style.transform='translateY(0)'},50);
    },600);
};

window._showShare = function(){
    document.getElementById('s4').style.opacity='0';
    setTimeout(()=>{
        document.getElementById('s4').style.display='none';
        const sh = document.getElementById('_SHARE_STATE');
        sh.style.display='block'; setTimeout(()=>{sh.style.opacity='1'},50);
        _refreshUI();
    },600);
};

function _renderFullContent() {
    const d = _D[_cL];
    let html = `<h1 style="text-align:center; margin-bottom:100px">${d.full}</h1>`;
    d.s.forEach(cap => {
        html += `<div class="_cap_full"><h3>${cap.h}</h3><h4>${cap.sub}</h4><p>${_bnd(cap.p)}</p></div>`;
    });
    document.getElementById('_F_BODY').innerHTML = html;
}

window._revealFull = function(){
    document.body.style.overflowY = 'auto';
    document.documentElement.style.overflowY = 'auto';
    const sh = document.getElementById('_SHARE_STATE');
    const f = document.getElementById('_FULL_MANIFESTO');
    sh.style.opacity='0';
    setTimeout(()=>{
        sh.style.display='none';
        f.style.display='block'; setTimeout(()=>{f.style.opacity='1'},50);
        _renderFullContent();
        window.scrollTo(0,0);
    },600);
};

window._cp = function(){
    const t = document.getElementById('_ST');
    t.select(); navigator.clipboard.writeText(t.value);
    const d = _D[_cL];
    document.getElementById('_BCP').innerText = d.ok;
    setTimeout(()=>{ document.getElementById('_BCP').innerText = d.cp; }, 2000);
};

if(_cL === 'ar') document.body.setAttribute('dir', 'rtl');
_u(1);
})();
</script>
</body>
</html>
